name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The fast unit suite mocks out torch/whisperX/yt-dlp, so we install the package
      # WITHOUT its heavy runtime dependencies — just pytest. Keeps CI fast and green
      # without needing an HF token, network, or gigabytes of models.
      - name: Install (no heavy deps)
        run: |
          python -m pip install --upgrade pip
          pip install --no-deps -e .
          pip install pytest

      - name: Run fast test suite
        run: pytest -q
