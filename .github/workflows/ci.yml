name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: every job here only reads the repo (checkout, pytest,
# towncrier check, shellcheck). A job that ever needs more can widen locally.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # The fast unit suite mocks out torch/whisperX/yt-dlp, so we install the package
      # WITHOUT its heavy runtime dependencies — just pytest. Keeps CI fast and green
      # without needing an HF token, network, or gigabytes of models.
      - name: Install (no heavy deps)
        run: |
          python -m pip install --upgrade pip
          pip install --no-deps -e .
          pip install pytest

      - name: Run fast test suite
        run: pytest -q

  changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for a changelog fragment
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          python -m pip install --upgrade pip
          pip install "towncrier>=23.11"
          towncrier check --compare-with "origin/${BASE_REF}"

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint install.sh
        run: shellcheck install.sh
